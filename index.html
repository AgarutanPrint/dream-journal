<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Sacramento&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --indigo:#3B4C7A;
    --indigo-deep:#2A3A61;
    --gold:#E0B255;
    --lavender:#F6F2FA;
    --paper:#FFFFFF;
    --ink:#2B2740;
    --ink-soft:#867FA0;
    --line:rgba(59,76,122,0.15);
    --shadow: 0 16px 36px rgba(43,39,64,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Nunito', sans-serif;
    background: radial-gradient(circle at 15% 0%, #EDE9F7 0%, var(--lavender) 45%);
    color:var(--ink);
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
  }
  h1,h2,h3,.display{font-family:'Playfair Display', serif;}
  .script{font-family:'Sacramento', cursive;}
  .app{
    width:100%; max-width:540px; min-height:100vh;
    display:flex; flex-direction:column; position:relative;
    background:var(--paper); box-shadow:var(--shadow);
  }

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px; background:var(--indigo); color:#fff;
    position:sticky; top:0; z-index:30;
  }
  .topbar .brand{display:flex; align-items:center; gap:8px; font-weight:800; font-size:15px;}
  .topbar .brand .ic{font-size:18px;}
  .topbar-actions{display:flex; gap:8px;}
  .icon-btn{
    border:none; background:rgba(255,255,255,0.16); color:#fff;
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:15px; transition:background .2s, transform .2s;
  }
  .icon-btn:hover{background:rgba(255,255,255,0.28); transform:scale(1.05);}
  .back-btn{
    border:none; background:rgba(255,255,255,0.16); color:#fff;
    padding:8px 14px; border-radius:999px; font-weight:800; font-size:13px;
    cursor:pointer; display:flex; align-items:center; gap:6px;
  }

  .content{flex:1; padding:20px 18px 40px;}

  /* ---------- LIST VIEW ---------- */
  .hero{
    display:flex; align-items:center; gap:14px;
    background:linear-gradient(135deg, var(--indigo), var(--indigo-deep));
    border-radius:22px; padding:18px; color:#fff; margin-bottom:16px;
    box-shadow:var(--shadow); position:relative; overflow:hidden;
  }
  .hero img{width:60px; height:auto; flex:none; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3));}
  .hero .txt h1{margin:0; font-size:26px; line-height:1.1; font-family:'Sacramento',cursive;}
  .hero .txt p{margin:4px 0 0; font-size:12.5px; opacity:.85;}

  .settings-strip{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--lavender); border-radius:14px; padding:10px 14px; margin-bottom:18px;
    font-size:12.5px; color:var(--ink-soft); cursor:pointer;
  }
  .settings-strip b{color:var(--ink); font-weight:800;}
  .settings-strip .edit{color:var(--indigo); font-weight:800;}

  .new-btn{
    width:100%; border:none; background:var(--gold); color:#3A2A0E;
    font-family:'Playfair Display'; font-weight:800; font-size:15px;
    padding:14px; border-radius:16px; cursor:pointer; margin-bottom:20px;
    box-shadow:0 10px 20px rgba(224,178,85,0.35); transition:transform .15s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .new-btn:hover{transform:translateY(-2px);}

  .empty-state{ text-align:center; padding:50px 20px; color:var(--ink-soft); }
  .empty-state .g{font-size:46px; margin-bottom:10px;}
  .empty-state h3{margin:0 0 6px; color:var(--ink);}
  .empty-state p{font-size:13.5px; line-height:1.5;}

  .entry-list{display:flex; flex-direction:column; gap:12px;}
  .entry-card{
    background:var(--lavender); border-radius:18px; padding:14px 16px;
    display:flex; align-items:center; gap:12px; cursor:pointer;
    border:2px solid transparent; transition:border-color .15s, transform .15s;
    position:relative;
  }
  .entry-card:hover{border-color:var(--gold); transform:translateX(2px);}
  .entry-card .swatch{
    width:44px; height:44px; border-radius:50%; flex:none;
    background:var(--indigo); color:#fff; display:flex; align-items:center; justify-content:center;
    font-size:19px;
  }
  .entry-card .info{flex:1; min-width:0;}
  .entry-card .info .name{font-weight:800; font-size:15px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .entry-card .info .meta{font-size:12px; color:var(--ink-soft); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .entry-card .del{
    position:absolute; top:8px; right:8px; border:none; background:transparent;
    color:var(--ink-soft); font-size:13px; cursor:pointer; padding:4px;
  }

  /* ---------- SETTINGS / COVER VIEW ---------- */
  .cover-hero{ text-align:center; margin-bottom:16px; }
  .cover-hero img{width:150px;}
  .cover-hero h1{font-family:'Sacramento',cursive; font-size:36px; color:var(--indigo-deep); margin:6px 0 0;}

  /* ---------- ENTRY VIEW ---------- */
  .section-block{
    background:var(--paper); border:1px solid var(--line); border-radius:20px;
    padding:18px; margin-bottom:16px; box-shadow:0 6px 18px rgba(43,39,64,0.06);
  }
  .section-block h2{
    font-size:16px; margin:0 0 14px; color:var(--indigo-deep);
    display:flex; align-items:center; gap:8px;
    font-family:'Sacramento',cursive; font-weight:400;
  }
  .section-block h2 .ic{font-size:18px;}
  .field{margin-bottom:14px;}
  .field:last-child{margin-bottom:0;}
  .field label{
    display:block; font-size:11.5px; font-weight:800; color:var(--ink-soft);
    text-transform:uppercase; letter-spacing:.4px; margin-bottom:6px;
  }
  .field input[type="text"], .field textarea{
    width:100%; border:2px solid var(--line); border-radius:12px;
    padding:10px 12px; font-size:14.5px; font-family:'Nunito'; color:var(--ink);
    background:var(--lavender); transition:border-color .15s;
  }
  .field input[type="text"]:focus, .field textarea:focus{outline:none; border-color:var(--gold);}
  .field textarea{resize:vertical; min-height:64px; line-height:1.4;}
  .two-col{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

  .chip-row{display:flex; flex-wrap:wrap; gap:7px;}
  .chip{
    padding:8px 13px; border-radius:999px; font-size:12.5px; font-weight:800;
    background:var(--lavender); border:2px solid var(--line); color:var(--ink-soft);
    cursor:pointer; transition:all .15s; user-select:none;
  }
  .chip.selected{background:var(--indigo); color:#fff; border-color:var(--indigo-deep);}
  .chip:hover{border-color:var(--gold);}

  .export-btn{
    width:100%; border:2px solid var(--indigo); background:#fff; color:var(--indigo-deep);
    font-family:'Nunito'; font-weight:800; font-size:13.5px;
    padding:11px; border-radius:14px; cursor:pointer; margin-bottom:16px;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:background .15s, color .15s;
  }
  .export-btn:hover{background:var(--indigo); color:#fff;}

  .save-note{ text-align:center; font-size:11.5px; color:var(--ink-soft); margin-top:6px; }

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(43,39,64,0.5);
    display:none; align-items:center; justify-content:center; z-index:60; padding:20px;
  }
  .modal-backdrop.show{display:flex;}
  .modal{background:#fff; border-radius:20px; padding:22px; max-width:340px; text-align:center;}
  .modal h3{margin-top:0; font-family:'Playfair Display';}
  .modal .row{display:flex; gap:10px; margin-top:16px;}
  .modal button{flex:1; border:none; padding:11px; border-radius:999px; font-weight:800; cursor:pointer;}
  .modal .confirm{background:var(--indigo); color:#fff;}
  .modal .cancel{background:var(--lavender); color:var(--ink);}

  /* ---------- PRINT / PDF EXPORT ---------- */
  #printArea{display:none;}
  @media print{
    body *{ visibility:hidden; }
    #printArea, #printArea *{ visibility:visible; }
    #printArea{ display:block; position:absolute; left:0; top:0; width:100%; padding:0; }
    @page{ margin:16mm; }
  }
  .print-page{ font-family:'Nunito', sans-serif; color:#2B2740; max-width:720px; margin:0 auto; }
  .print-page .p-header{ text-align:center; margin-bottom:18px; }
  .print-page .p-header img{ width:60px; margin-bottom:6px; }
  .print-page .p-header h1{ font-family:'Sacramento',cursive; font-size:30px; color:var(--indigo); margin:0 0 2px; }
  .print-page .p-header .sub{ font-size:12.5px; color:var(--ink-soft); }
  .print-section{ margin-bottom:16px; break-inside:avoid; }
  .print-section h2{
    font-size:12.5px; text-transform:uppercase; letter-spacing:1px; color:#fff;
    background:var(--indigo); padding:5px 10px; border-radius:6px; margin:0 0 8px;
  }
  .print-grid{ display:grid; grid-template-columns:1fr 1fr; gap:4px 24px; }
  .print-row{ font-size:12.5px; margin-bottom:5px; line-height:1.4; }
  .print-row.full{ grid-column:1/-1; }
  .print-row .lbl{ font-weight:800; color:var(--indigo-deep); margin-right:4px; }
  .print-row .val{ color:#2B2740; }
  .print-row .val.empty{ color:#bbb; }
  .print-footer{ text-align:center; font-size:10.5px; color:var(--ink-soft); margin-top:20px; }

  @media (max-width:380px){ .hero img{width:48px;} }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div id="topbarLeft" class="brand"><span class="ic">🌙</span><span>Dream Journal</span></div>
    <div class="topbar-actions" id="topbarActions">
      <button class="icon-btn" id="clearAllBtn" title="Clear all entries">↺</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<div id="printArea"></div>

<div class="modal-backdrop" id="confirmModal">
  <div class="modal">
    <h3 id="confirmTitle">Are you sure?</h3>
    <p id="confirmBody" style="font-size:13px;color:var(--ink-soft)"></p>
    <div class="row">
      <button class="cancel" id="confirmCancel">Cancel</button>
      <button class="confirm" id="confirmOk">Yes, do it</button>
    </div>
  </div>
</div>

const ENTRIES_KEY = 'dream-journal:entries';
const SETTINGS_KEY = 'dream-journal:settings';

const DREAM_TYPES = ['Nightmare','Being Chased','Cathartic','Epic','Recurring','Sexual/Fantasy','Symbolic','Other','Lucid','False Awakening','Falling'];

function blankEntry(){
  return {
    id:'d'+Date.now()+Math.random().toString(36).slice(2,7),
    createdAt: Date.now(),
    date:'', time:'',
    thoughtsBeforeSleep:'', emotionsBeforeSleep:'',
    dreamTypes:[], otherType:'',
    dream:'', feelingUponWaking:'', interpretation:'', note:''
  };
}
function blankSettings(){ return { dreamerName:'', started:'', tracking:'' }; }

let entries = [];
let settings = blankSettings();
let view = 'list'; // 'list' | 'entry' | 'settings'
let currentId = null;

function loadAll(){
  try{ const raw = localStorage.getItem(ENTRIES_KEY); entries = raw ? JSON.parse(raw) : []; }catch(e){ entries = []; }
  try{ const raw = localStorage.getItem(SETTINGS_KEY); settings = raw ? JSON.parse(raw) : blankSettings(); }catch(e){ settings = blankSettings(); }
}
function saveEntries(){ try{ localStorage.setItem(ENTRIES_KEY, JSON.stringify(entries)); }catch(e){console.error(e);} }
function saveSettings(){ try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }catch(e){console.error(e);} }
function getEntry(id){ return entries.find(e=>e.id===id); }

function el(tag, cls, html){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(html!==undefined) e.innerHTML = html;
  return e;
}
function escapeHtml(str){
  return String(str==null?'':str).replace(/[&<>"']/g, s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

function render(){
  const content = document.getElementById('content');
  content.innerHTML = '';
  const topbarLeft = document.getElementById('topbarLeft');
  const topbarActions = document.getElementById('topbarActions');

  if(view==='list'){
    topbarLeft.innerHTML = `<span class="ic">🌙</span><span>Dream Journal</span>`;
    topbarActions.innerHTML = `<button class="icon-btn" id="clearAllBtn" title="Clear all entries">↺</button>`;
    document.getElementById('clearAllBtn').addEventListener('click', confirmClearAll);
    content.appendChild(renderList());
  } else if(view==='settings'){
    topbarLeft.innerHTML = `<button class="back-btn" id="backBtn">‹ Journal</button>`;
    topbarActions.innerHTML = '';
    document.getElementById('backBtn').addEventListener('click', ()=>{ view='list'; render(); });
    content.appendChild(renderSettings());
  } else {
    const entry = getEntry(currentId);
    topbarLeft.innerHTML = `<button class="back-btn" id="backBtn">‹ Journal</button>`;
    topbarActions.innerHTML = `<button class="icon-btn" id="printEntryBtn" title="Export / Print as PDF">🖨️</button><button class="icon-btn" id="deleteEntryBtn" title="Delete this dream">🗑</button>`;
    document.getElementById('backBtn').addEventListener('click', ()=>{ view='list'; render(); });
    document.getElementById('printEntryBtn').addEventListener('click', ()=>exportEntryPDF(entry));
    document.getElementById('deleteEntryBtn').addEventListener('click', ()=>confirmDeleteEntry(entry.id));
    content.appendChild(renderEntryForm(entry));
  }
}

// ---------- LIST VIEW ----------
function renderList(){
  const wrap = el('div');

  const hero = el('div','hero');
  hero.innerHTML = `
    <img src="${DREAMCATCHER_IMG}" alt="">
    <div class="txt">
      <h1>Dream Journal</h1>
      <p>${entries.length} dream${entries.length===1?'':'s'} recorded</p>
    </div>
  `;
  wrap.appendChild(hero);

  const strip = el('div','settings-strip');
  const who = settings.dreamerName ? `<b>${escapeHtml(settings.dreamerName)}</b>'s journal` : 'Set up your journal cover';
  strip.innerHTML = `<span>${who}</span><span class="edit">Edit ✎</span>`;
  strip.addEventListener('click', ()=>{ view='settings'; render(); });
  wrap.appendChild(strip);

  const newBtn = el('button','new-btn','+ Log a New Dream');
  newBtn.addEventListener('click', ()=>{
    const e = blankEntry();
    entries.unshift(e);
    saveEntries();
    currentId = e.id;
    view = 'entry';
    render();
  });
  wrap.appendChild(newBtn);

  if(entries.length===0){
    const empty = el('div','empty-state');
    empty.innerHTML = `<div class="g">☁️</div><h3>No dreams logged yet</h3><p>Tap "Log a New Dream" as soon as you wake up, while it's still fresh.</p>`;
    wrap.appendChild(empty);
    return wrap;
  }

  const list = el('div','entry-list');
  entries
    .slice()
    .sort((a,b)=> (b.updatedAt||b.createdAt) - (a.updatedAt||a.createdAt))
    .forEach(entry=>{
      const card = el('div','entry-card');
      const typeStr = entry.dreamTypes && entry.dreamTypes.length ? entry.dreamTypes.join(', ') : 'Untagged';
      const name = entry.date || 'Undated dream';
      const meta = [typeStr, entry.time].filter(Boolean).join(' · ');
      card.innerHTML = `
        <div class="swatch">🌙</div>
        <div class="info">
          <div class="name">${escapeHtml(name)}</div>
          <div class="meta">${escapeHtml(meta)}</div>
        </div>
        <button class="del" data-id="${entry.id}" title="Delete">✕</button>
      `;
      card.addEventListener('click', (e)=>{
        if(e.target.closest('.del')) return;
        currentId = entry.id; view='entry'; render();
      });
      card.querySelector('.del').addEventListener('click', (e)=>{
        e.stopPropagation();
        confirmDeleteEntry(entry.id);
      });
      list.appendChild(card);
    });
  wrap.appendChild(list);
  return wrap;
}

// ---------- SETTINGS / COVER VIEW ----------
function renderSettings(){
  const wrap = el('div');
  const coverHero = el('div','cover-hero');
  coverHero.innerHTML = `<img src="${DREAMCATCHER_IMG}" alt=""><h1>Dream Journal</h1>`;
  wrap.appendChild(coverHero);

  const block = el('div','section-block');
  block.innerHTML = `<h2><span class="ic">📖</span> Journal Cover</h2>`;
  function field(key, labelText, placeholder){
    const f = el('div','field');
    f.innerHTML = `<label>${labelText}</label>`;
    const inp = el('input'); inp.type='text'; inp.value = settings[key]||''; inp.placeholder = placeholder||'';
    inp.addEventListener('input', ()=>{ settings[key]=inp.value; saveSettings(); });
    f.appendChild(inp);
    block.appendChild(f);
  }
  field('dreamerName', "Dreamer's Name", 'e.g. Sasha Moreau');
  field('started', 'Journal Started', 'e.g. July 2026');
  field('tracking', 'A Symbol or Theme I\'m Tracking', 'e.g. Water, flying, a recurring house');
  wrap.appendChild(block);

  const note = el('div','save-note','Saves automatically on this device.');
  wrap.appendChild(note);
  return wrap;
}

// ---------- ENTRY FORM ----------
function renderEntryForm(entry){
  const wrap = el('div');
  const exportBtn = el('button','export-btn','🖨️ Export / Print This Dream');
  exportBtn.addEventListener('click', ()=>exportEntryPDF(entry));
  wrap.appendChild(exportBtn);

  function touch(){ entry.updatedAt = Date.now(); saveEntries(); }

  function textField(container, key, labelText, opts={}){
    const f = el('div','field');
    f.innerHTML = `<label>${labelText}</label>`;
    const inputEl = opts.textarea ? el('textarea') : el('input');
    if(!opts.textarea) inputEl.type = 'text';
    inputEl.value = entry[key] || '';
    if(opts.placeholder) inputEl.placeholder = opts.placeholder;
    inputEl.addEventListener('input', ()=>{ entry[key] = inputEl.value; touch(); });
    f.appendChild(inputEl);
    container.appendChild(f);
  }

  // Before Sleep
  const before = el('div','section-block');
  before.innerHTML = `<h2><span class="ic">🌆</span> Before Sleep</h2>`;
  const row = el('div','two-col');
  before.appendChild(row);
  textField(row, 'date', 'Date');
  textField(row, 'time', 'Time');
  textField(before, 'thoughtsBeforeSleep', 'Thoughts Before Sleep', {textarea:true});
  textField(before, 'emotionsBeforeSleep', 'Emotions Before Sleep');
  wrap.appendChild(before);

  // Type of Dream
  const typeBlock = el('div','section-block');
  typeBlock.innerHTML = `<h2><span class="ic">🔮</span> Type of Dream</h2>`;
  const typeField = el('div','field');
  const chipRow = el('div','chip-row');
  DREAM_TYPES.forEach(type=>{
    const chip = el('div','chip', type);
    if((entry.dreamTypes||[]).includes(type)) chip.classList.add('selected');
    chip.addEventListener('click', ()=>{
      if(!entry.dreamTypes) entry.dreamTypes = [];
      const idx = entry.dreamTypes.indexOf(type);
      if(idx>-1) entry.dreamTypes.splice(idx,1); else entry.dreamTypes.push(type);
      chip.classList.toggle('selected');
      touch();
    });
    chipRow.appendChild(chip);
  });
  typeField.appendChild(chipRow);
  typeBlock.appendChild(typeField);
  textField(typeBlock, 'otherType', 'If "Other," describe it', {placeholder:'Optional'});
  wrap.appendChild(typeBlock);

  // Dream
  const dreamBlock = el('div','section-block');
  dreamBlock.innerHTML = `<h2><span class="ic">💭</span> Dream</h2>`;
  textField(dreamBlock, 'dream', 'Dream', {textarea:true, placeholder:'Write it all down, even the fuzzy parts'});
  wrap.appendChild(dreamBlock);

  // Feeling Upon Awakening
  const feelBlock = el('div','section-block');
  feelBlock.innerHTML = `<h2><span class="ic">☀️</span> Feeling Upon Awakening</h2>`;
  textField(feelBlock, 'feelingUponWaking', 'Feeling Upon Awakening');
  wrap.appendChild(feelBlock);

  // Interpretation
  const interpBlock = el('div','section-block');
  interpBlock.innerHTML = `<h2><span class="ic">🔍</span> Interpretation</h2>`;
  textField(interpBlock, 'interpretation', 'Interpretation', {textarea:true});
  wrap.appendChild(interpBlock);

  // Note/Comment
  const noteBlock = el('div','section-block');
  noteBlock.innerHTML = `<h2><span class="ic">📝</span> Note / Comment</h2>`;
  textField(noteBlock, 'note', 'Note / Comment', {textarea:true});
  wrap.appendChild(noteBlock);

  const note2 = el('div','save-note','Everything here saves automatically on this device.');
  wrap.appendChild(note2);

  return wrap;
}

// ---------- print / PDF export ----------
function pv(val){
  return val ? `<span class="val">${escapeHtml(val)}</span>` : `<span class="val empty">—</span>`;
}
function printRow(label, val, full=false){
  return `<div class="print-row${full?' full':''}"><span class="lbl">${label}:</span>${pv(val)}</div>`;
}
function buildPrintHTML(entry){
  const title = entry.date || 'Undated Dream';
  const types = (entry.dreamTypes||[]).join(', ');

  return `
    <div class="print-page">
      <div class="p-header">
        <img src="${DREAMCATCHER_IMG}" alt="">
        <h1>Dream Journal</h1>
        <div class="sub">${escapeHtml(title)}${entry.time ? ' · '+escapeHtml(entry.time) : ''}</div>
      </div>

      <div class="print-section">
        <h2>Before Sleep</h2>
        <div class="print-grid">
          ${printRow('Date', entry.date)}
          ${printRow('Time', entry.time)}
          ${printRow('Thoughts Before Sleep', entry.thoughtsBeforeSleep, true)}
          ${printRow('Emotions Before Sleep', entry.emotionsBeforeSleep, true)}
        </div>
      </div>

      <div class="print-section">
        <h2>Type of Dream</h2>
        <div class="print-grid">
          ${printRow('Types', types, true)}
          ${entry.otherType ? printRow('Other', entry.otherType, true) : ''}
        </div>
      </div>

      <div class="print-section">
        <h2>Dream</h2>
        <div class="print-grid">${printRow('Dream', entry.dream, true)}</div>
      </div>

      <div class="print-section">
        <h2>Feeling Upon Awakening</h2>
        <div class="print-grid">${printRow('Feeling', entry.feelingUponWaking, true)}</div>
      </div>

      <div class="print-section">
        <h2>Interpretation</h2>
        <div class="print-grid">${printRow('Interpretation', entry.interpretation, true)}</div>
      </div>

      <div class="print-section">
        <h2>Note / Comment</h2>
        <div class="print-grid">${printRow('Note', entry.note, true)}</div>
      </div>

      <div class="print-footer">Dream Journal — exported from your digital journal</div>
    </div>
  `;
}
function exportEntryPDF(entry){
  const area = document.getElementById('printArea');
  area.innerHTML = buildPrintHTML(entry);
  setTimeout(()=>window.print(), 60);
}

// ---------- confirm modal ----------
function showConfirm(title, body, onOk){
  const modal = document.getElementById('confirmModal');
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmBody').textContent = body;
  modal.classList.add('show');
  const okBtn = document.getElementById('confirmOk');
  const cancelBtn = document.getElementById('confirmCancel');
  const cleanup = ()=>{ modal.classList.remove('show'); okBtn.onclick=null; cancelBtn.onclick=null; };
  okBtn.onclick = ()=>{ cleanup(); onOk(); };
  cancelBtn.onclick = cleanup;
}
function confirmClearAll(){
  showConfirm('Clear the whole journal?', 'This deletes every dream you\'ve logged on this device. It can\'t be undone.', ()=>{
    entries = []; saveEntries(); render();
  });
}
function confirmDeleteEntry(id){
  showConfirm('Delete this dream?', 'This entry will be gone for good.', ()=>{
    entries = entries.filter(e=>e.id!==id);
    saveEntries();
    if(view==='entry' && currentId===id){ view='list'; }
    render();
  });
}

// ---------- boot ----------
loadAll();
render();
</script>
</body>
</html>
